<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spkn.fun - Image Hosting</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>spkn.fun - Upload & Share Images</h1>
        <input type="file" id="imageUpload" accept="image/*">
        <button onclick="uploadImage()">Upload</button>
        <div id="preview"></div>
        <div id="links"></div>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageUpload');
            if (!fileInput.files.length) {
                alert('Please select an image to upload.');
                return;
            }
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=5b267b48964fdc32f2e179dddfe27ce5', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    const imageUrl = data.data.url;
                    document.getElementById('links').innerHTML = `<p>Image URL: <a href="${imageUrl}" target="_blank">${imageUrl}</a></p>`;
                } else {
                    alert('Upload failed.');
                }
            } catch (error) {
                console.error('Error uploading image:', error);
                alert('An error occurred.');
            }
        }
    </script>
</body>
</html>
